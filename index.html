<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Project - Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="player">Player Score: <span class="pscore"></span></div>
      <div class="computer">Computer Score: <span class="cscore"></span></div>
      <div id="message">Select Rock, Paper, or Scissors to begin!</div>
      <button id="rock" data-key="test">Rock</button>
      <button id="paper">Paper</button>
      <button id="scissors">Scissors</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
